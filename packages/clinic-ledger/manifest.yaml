name: clinic-ledger
version: 0.2.0
description: |
  Clinic patient payment ledger: the clinicaccount vertex type (CreateAccount,
  independently-minted id, one per patient via a .ledgerAccount guard aspect
  on the patient) + the clinictransaction vertex type (DebitAccount /
  CreditAccount, append-only entries linked to the account via postedTo; a
  debit entry carries a bounded billedTo self|insurance + optional
  expectedReimbursementCents payer dimension, and an optional appointmentRef
  back-ref) + the clinicLedgerHistory read-model lens (one row per
  transaction) + the clinicPatientAccounts lens (patient -> account key
  lookup) + the clinicNoShowSettlement Weaver playbook (no-show fee
  auto-charge). Depends clinic-domain.
depends:
  - clinic-domain
declares:
  ddls:
    - canonicalName: clinicaccount
      class: meta.ddl.vertexType
    - canonicalName: clinicLedgerAccountGuard
      class: meta.ddl.aspectType
    - canonicalName: clinictransaction
      class: meta.ddl.vertexType
  lenses:
    - canonicalName: clinicLedgerHistory
      adapter: nats-kv
      bucket: clinic-ledger-history
      engine: full
    - canonicalName: clinicPatientAccounts
      adapter: nats-kv
      bucket: clinic-patient-accounts
      engine: full
    - canonicalName: clinicNoShowSettlement
      adapter: nats-kv
      bucket: weaver-targets
      engine: full
  permissions:
    - operationType: CreateAccount
      scope: any
      grantsTo: [operator]
    - operationType: DebitAccount
      scope: any
      grantsTo: [operator]
    - operationType: CreditAccount
      scope: any
      grantsTo: [operator]
  weaverTargets:
    - targetId: clinicNoShowSettlement
      lensRef: clinicNoShowSettlement
