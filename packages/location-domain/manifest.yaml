name: location-domain
version: 0.2.0
description: |
  Spatial base domain — the place graph. Owns the unit/building/property
  location vertex types (all class location, Contract #6 §6.9) and the
  containedIn containment link (location → location, transitive). Provides
  CreateLocation, TombstoneLocation, WireContainedIn, UnwireContainedIn,
  SetLocationPresentation. Single DDL `location` with a locationType discriminator.
  Locations carry an optional .presentation display aspect (class-2 nameable
  business vertices, display-name-convention-design.md). No dependencies.
depends: []
declares:
  ddls:
    - canonicalName: location
      class: meta.ddl.vertexType
  permissions:
    - operationType: CreateLocation
      scope: any
      grantsTo: [operator]
    - operationType: TombstoneLocation
      scope: any
      grantsTo: [operator]
    - operationType: WireContainedIn
      scope: any
      grantsTo: [operator]
    - operationType: UnwireContainedIn
      scope: any
      grantsTo: [operator]
    - operationType: SetLocationPresentation
      scope: any
      grantsTo: [operator]
