name: loftspace-ledger
version: 0.1.0
description: |
  Loftspace tenant payment ledger: the account vertex type (CreateAccount, one
  per lease, deterministic id) + the transaction vertex type (DebitAccount /
  CreditAccount, append-only entries linked to the account via postedTo) + the
  ledgerHistory read-model lens (one row per transaction). Depends
  lease-signing.
depends:
  - lease-signing
declares:
  ddls:
    - canonicalName: account
      class: meta.ddl.vertexType
    - canonicalName: transaction
      class: meta.ddl.vertexType
  lenses:
    - canonicalName: ledgerHistory
      adapter: nats-kv
      bucket: loftspace-ledger-history
      engine: full
  permissions:
    - operationType: CreateAccount
      scope: any
      grantsTo: [operator]
    - operationType: DebitAccount
      scope: any
      grantsTo: [operator]
    - operationType: CreditAccount
      scope: any
      grantsTo: [operator]
