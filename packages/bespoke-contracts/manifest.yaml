name: bespoke-contracts
version: 0.2.0
description: |
  LoftSpace "Executable Paper" reference package (Fires V1+V2 — fixed/one-time
  computational, conditioned, and judgment clauses): the clause vertex type
  (CreateClause, .prose/.terms/.status/.clauseInspection aspects, governs +
  chargesTo/requiresInspectionBy/conditionedOn links) + the clauseSatisfaction
  actorAggregate convergence lens (§10.2, missing_charge/missing_inspection) +
  the §10.8 playbook dispatching directOp(DebitAccount)/assignTask
  (InspectPremises) on the gaps. Depends lease-signing + loftspace-ledger.
depends:
  - lease-signing
  - loftspace-ledger
declares:
  ddls:
    - canonicalName: clause
      class: meta.ddl.vertexType
    - canonicalName: clauseProse
      class: meta.ddl.aspectType
    - canonicalName: clauseTerms
      class: meta.ddl.aspectType
    - canonicalName: clauseStatus
      class: meta.ddl.aspectType
    - canonicalName: clauseInspection
      class: meta.ddl.aspectType
  lenses:
    - canonicalName: clauseSatisfaction
      adapter: nats-kv
      bucket: weaver-targets
      engine: full
  permissions:
    - operationType: CreateClause
      scope: any
      grantsTo: [operator]
    - operationType: InspectPremises
      scope: any
      grantsTo: [operator]
  weaverTargets:
    - targetId: clauseSatisfaction
      lensRef: clauseSatisfaction
  opMetas:
    - operationType: CreateClause
    - operationType: InspectPremises
