name: loftspace-domain
version: 0.7.0
description: |
  LoftSpace listing economics. Adds the leasable facets of a unit — the
  .listing aspect (rent / term / availability) and the .address aspect — on
  top of location-domain's place graph, without introducing a vertex type.
  The op scripts live on the loftspaceListing vertexType DDL; the listing and
  address aspect-type DDLs are step-6 write gates. A second vertexType DDL,
  loftspaceOwnership, owns AssignUnitOwner / RemoveUnitOwner — the landlord→unit
  management link (cap-read.residence's ownership relationship, D1.3). Depends on
  location-domain (which owns vtx.unit). Three projection lenses: availableListings
  (listed units), applicantRosterRead — the PROTECTED Postgres identity roster
  (Contract #6 §6.14 RLS, D1.5, mirroring clinic-domain's clinicPatientsRead) and
  a SECURE LENS (Contract #3 §3.10): the identity name is a sensitive aspect that
  Refractor decrypts at projection time into this RLS-protected table, the only
  roster surface — cmd/loftspace-app reads it as an authenticated actor via the
  reserved WildcardAnchor grant, both for the identity picker and for server-side
  name resolution; and landlordUnitsRead — a PROTECTED, landlord-anchored Postgres
  model of every unit a landlord manages (portfolio-pulse occupancy), independent
  of any lease application.
depends:
  - location-domain
declares:
  ddls:
    - canonicalName: loftspaceListing
      class: meta.ddl.vertexType
    - canonicalName: listing
      class: meta.ddl.aspectType
    - canonicalName: address
      class: meta.ddl.aspectType
    - canonicalName: loftspaceOwnership
      class: meta.ddl.vertexType
  lenses:
    - canonicalName: availableListings
      adapter: nats-kv
      bucket: loftspace-listings
      engine: full
    - canonicalName: applicantRosterRead
      adapter: postgres
      engine: full
    - canonicalName: landlordUnitsRead
      adapter: postgres
      engine: full
  permissions:
    - operationType: SetListing
      scope: any
      grantsTo: [operator]
    - operationType: SetUnitAddress
      scope: any
      grantsTo: [operator]
    - operationType: SetListingStatus
      scope: any
      grantsTo: [operator]
    - operationType: AssignUnitOwner
      scope: any
      grantsTo: [operator]
    - operationType: RemoveUnitOwner
      scope: any
      grantsTo: [operator]
