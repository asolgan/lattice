<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Clinic — Sign in</title>
  <!-- Self-contained on purpose: this page is served before any session
       exists, so it must not depend on a stylesheet or script the app's own
       session-gated routes would have to hand out. -->
  <style>
    :root {
      --bg: #0f1115;
      --bg-raised: #171a21;
      --bg-input: #1e222b;
      --border: #2a2f3a;
      --text: #d7dce4;
      --text-dim: #8a93a3;
      --accent: #5aa9e6;
      --accent-dim: #3d6e96;
      --red: #e0564a;
      --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .card {
      width: 400px;
      max-width: 100%;
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px;
    }
    .brand { font-weight: 600; font-size: 16px; letter-spacing: 0.3px; margin: 0 0 2px; }
    .brand-sub { color: var(--text-dim); font-weight: 400; }
    .lead { color: var(--text-dim); font-size: 13px; margin: 0 0 18px; }
    label { display: block; font-size: 13px; margin-bottom: 5px; }
    input[type="text"] {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 10px;
      border-radius: 6px;
      font: 13px var(--mono);
      margin-bottom: 12px;
    }
    button {
      width: 100%;
      background: var(--accent-dim);
      border: 1px solid var(--accent-dim);
      color: #fff;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      font: inherit;
      font-size: 13px;
    }
    button:hover { background: var(--accent); border-color: var(--accent); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    .persona {
      display: block;
      width: 100%;
      text-align: left;
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 11px 14px;
      margin-bottom: 10px;
    }
    .persona:hover { background: var(--accent-dim); border-color: var(--accent); }
    .persona .p-label { display: block; font-weight: 600; font-size: 14px; }
    .persona .p-sub { display: block; color: var(--text-dim); font-size: 12px; margin-top: 2px; }
    .persona:hover .p-sub { color: var(--text); }
    #personas { display: none; }
    .status { margin: 14px 0 0; font-size: 12px; color: var(--text-dim); min-height: 1.5em; }
    .status.error { color: var(--red); }
  </style>
</head>
<body>
  <div class="card">
    <p class="brand">Clinic <span class="brand-sub">book an appointment</span></p>
    <p class="lead">Sign in to open the clinic. Front-desk staff see the whole practice; a patient sees only their own record.</p>

    <div id="personas"></div>

    <form id="login-form" novalidate>
      <label for="identity-id">Identity id</label>
      <input type="text" id="identity-id" spellcheck="false" autocomplete="off"
        placeholder="the bare NanoID of a seeded identity" />
      <button type="submit" id="login-submit">Sign in</button>
    </form>

    <p class="status" id="status" aria-live="polite"></p>
  </div>

  <script>
    (function () {
      var statusEl = document.getElementById("status");
      var personasEl = document.getElementById("personas");
      var loginForm = document.getElementById("login-form");
      var identityInput = document.getElementById("identity-id");
      var loginSubmit = document.getElementById("login-submit");

      function setStatus(msg, isError) {
        statusEl.textContent = msg || "";
        statusEl.className = "status" + (isError ? " error" : "");
      }

      // Already signed in (a cookie survived a reload)? Go straight to the app
      // rather than making a returning user sign in again. Gated on a real
      // COOKIE session (canSignOut): a boot-env fallback deployment always
      // reports loggedIn, so bouncing on that alone would trap a user who just
      // signed out in a /login <-> / loop with no way out.
      fetch("/api/whoami", { credentials: "same-origin" })
        .then(function (res) { return res.json(); })
        .then(function (body) { if (body && body.loggedIn && body.canSignOut) location.replace("/"); })
        .catch(function () { /* stay on this page */ });

      // Demo-persona posture: when the host names personas, render them as
      // one-tap sign-in cards and hide the free-form sign-in form (the host
      // refuses non-persona subjects anyway, so offering the field would be a
      // lie about what this deployment accepts).
      fetch("/api/login-options", { credentials: "same-origin" })
        .then(function (res) { return res.json(); })
        .then(function (body) {
          var personas = (body && body.personas) || [];
          if (!personas.length) { return; }
          loginForm.style.display = "none";
          personas.forEach(function (p) {
            var btn = document.createElement("button");
            btn.type = "button";
            btn.className = "persona";
            var label = document.createElement("span");
            label.className = "p-label";
            label.textContent = "Sign in as " + p.label;
            btn.appendChild(label);
            if (p.sub) {
              var sub = document.createElement("span");
              sub.className = "p-sub";
              sub.textContent = p.sub;
              btn.appendChild(sub);
            }
            btn.addEventListener("click", function () {
              btn.disabled = true;
              setStatus("Signing in…");
              devLogin(p.id)
                .catch(function (e) { setStatus("Request failed: " + e.message, true); })
                .finally(function () { btn.disabled = false; });
            });
            personasEl.appendChild(btn);
          });
          personasEl.style.display = "block";
        })
        .catch(function () { /* no personas — the free-form form stays */ });

      function devLogin(identityId) {
        return fetch("/api/dev-login", {
          method: "POST",
          credentials: "same-origin",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ identityId: identityId }),
        }).then(function (res) {
          if (res.ok) { location.replace("/"); return; }
          return res.json().then(function (body) {
            setStatus((body && body.error) || "Sign-in failed (" + res.status + ")", true);
          });
        });
      }

      loginForm.addEventListener("submit", function (ev) {
        ev.preventDefault();
        var id = identityInput.value.trim();
        if (!id) { setStatus("Enter an identity id first.", true); return; }
        loginSubmit.disabled = true;
        setStatus("Signing in…");
        devLogin(id)
          .catch(function (e) { setStatus("Request failed: " + e.message, true); })
          .finally(function () { loginSubmit.disabled = false; });
      });
    })();
  </script>
</body>
</html>
