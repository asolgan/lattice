<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Loupe — Log in</title>
  <style>
    :root {
      --bg: #0f1115;
      --bg-raised: #171a21;
      --bg-input: #1e222b;
      --border: #2a2f3a;
      --text: #d7dce4;
      --text-dim: #8a93a3;
      --accent: #5aa9e6;
      --accent-dim: #3d6e96;
      --red: #e0564a;
      --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .card {
      width: 360px;
      max-width: calc(100vw - 48px);
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 28px;
    }
    .brand { font-weight: 600; font-size: 18px; letter-spacing: 0.3px; margin: 0 0 2px; }
    .brand-sub { color: var(--text-dim); font-weight: 400; }
    .lede { color: var(--text-dim); margin: 0 0 20px; }
    button {
      width: 100%;
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      color: var(--text);
      padding: 9px 14px;
      border-radius: 6px;
      font: inherit;
      cursor: pointer;
    }
    button:hover { background: var(--accent); }
    button:disabled { opacity: 0.6; cursor: default; }
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-dim);
      margin: 20px 0;
      font-size: 12px;
    }
    .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--border); }
    textarea {
      width: 100%;
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 8px 10px;
      font: 12px var(--mono);
      resize: vertical;
      margin-bottom: 10px;
    }
    .manual { display: none; }
    .manual.visible { display: block; }
    .status { margin-top: 14px; font-size: 12px; color: var(--text-dim); min-height: 1.5em; }
    .status.error { color: var(--red); }
  </style>
</head>
<body>
  <div class="card">
    <p class="brand">Loupe <span class="brand-sub">· Lattice</span></p>
    <p class="lede">Operator login required — no valid session, no console.</p>

    <button type="button" id="dev-login">Log in as operator (dev)</button>

    <div class="divider">or present a token</div>

    <form id="manual-form" class="manual" novalidate>
      <textarea id="manual-token" rows="3" spellcheck="false"
        placeholder="paste an operator Bearer JWT (real IdP token, or gateway dev-token)"></textarea>
      <button type="submit" id="manual-submit">Use this token</button>
    </form>
    <button type="button" id="show-manual" class="manual-toggle">Have a token already?</button>

    <p class="status" id="status"></p>
  </div>

  <script>
    (function () {
      var statusEl = document.getElementById("status");
      var devBtn = document.getElementById("dev-login");
      var showManualBtn = document.getElementById("show-manual");
      var manualForm = document.getElementById("manual-form");
      var manualToken = document.getElementById("manual-token");
      var manualSubmit = document.getElementById("manual-submit");

      function setStatus(msg, isError) {
        statusEl.textContent = msg || "";
        statusEl.className = "status" + (isError ? " error" : "");
      }

      function revealManual() {
        manualForm.classList.add("visible");
        showManualBtn.style.display = "none";
        manualToken.focus();
      }

      showManualBtn.addEventListener("click", revealManual);

      // Already have a live session (a cookie survived a reload, or a token
      // was set some other way)? Bounce straight to the console — /api/*
      // is gated identically to everything else, so any non-401 here means
      // an authenticated operator (a 502 from NATS being down still counts:
      // that's a backend problem, not a login problem).
      fetch("/api/systemmap", { credentials: "same-origin" })
        .then(function (res) { if (res.status !== 401) location.replace("/"); })
        .catch(function () { /* not logged in yet — stay on this page */ });

      // confirmSessionAndGo re-checks that the session cookie the server just
      // set actually reached the browser's cookie jar before leaving this
      // page. A 200 from dev-token/session only proves the SERVER verified
      // the token — a Secure cookie is silently dropped by the browser if the
      // console is served over plain HTTP from a non-loopback address, which
      // would otherwise bounce the operator back to /login with no
      // explanation (a redirect loop that looks like nothing happened).
      function confirmSessionAndGo() {
        return fetch("/api/systemmap", { credentials: "same-origin" })
          .then(function (res) {
            if (res.status === 401) {
              setStatus("Login was accepted, but the browser did not keep the session — " +
                "if this console is reached over plain HTTP from a non-loopback address, " +
                "serve it over HTTPS (a Secure cookie cannot be stored otherwise).", true);
              return;
            }
            location.replace("/");
          })
          .catch(function (e) { setStatus("Could not confirm the session: " + e.message, true); });
      }

      devBtn.addEventListener("click", function () {
        devBtn.disabled = true;
        setStatus("Logging in…");
        fetch("/api/operator/dev-token", { method: "POST", credentials: "same-origin" })
          .then(function (res) {
            if (res.ok) { return confirmSessionAndGo(); }
            if (res.status === 404) {
              setStatus("Dev auth is disabled on this server — present an operator token below.", true);
              revealManual();
              return;
            }
            return res.json().then(function (body) {
              setStatus((body && body.error) || "Login failed (" + res.status + ")", true);
            });
          })
          .catch(function (e) { setStatus("Request failed: " + e.message, true); })
          .finally(function () { devBtn.disabled = false; });
      });

      manualForm.addEventListener("submit", function (ev) {
        ev.preventDefault();
        if (manualSubmit.disabled) return; // already in flight
        var tok = manualToken.value.trim();
        if (!tok) { setStatus("Paste a token first.", true); return; }
        manualSubmit.disabled = true;
        setStatus("Verifying…");
        fetch("/api/operator/session", {
          method: "POST",
          credentials: "same-origin",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token: tok }),
        })
          .then(function (res) {
            if (res.ok) { return confirmSessionAndGo(); }
            return res.json().then(function (body) {
              setStatus((body && body.error) || "Login failed (" + res.status + ")", true);
            });
          })
          .catch(function (e) { setStatus("Request failed: " + e.message, true); })
          .finally(function () { manualSubmit.disabled = false; });
      });
    })();
  </script>
</body>
</html>
