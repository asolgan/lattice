<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LoftSpace — apply to lease</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">LoftSpace <span class="brand-sub">apply to lease</span></div>
    <div class="who">
      <label for="applicant">Applicant</label>
      <select id="applicant" aria-label="Choose your applicant identity"></select>
    </div>
  </header>

  <nav class="tabs" role="tablist" aria-label="Applicant views">
    <button id="tab-browse" class="tab active" role="tab" aria-selected="true" aria-controls="view-browse">Browse &amp; Apply</button>
    <button id="tab-apps" class="tab" role="tab" aria-selected="false" aria-controls="view-apps">My Applications</button>
    <button id="tab-tasks" class="tab" role="tab" aria-selected="false" aria-controls="view-tasks">Tasks</button>
    <button id="tab-docs" class="tab" role="tab" aria-selected="false" aria-controls="view-docs">Documents</button>
  </nav>

  <main>
    <!-- Browse & Apply -->
    <section id="view-browse" role="tabpanel" aria-labelledby="tab-browse">
      <div class="panel-controls">
        <label for="status">Show</label>
        <select id="status" aria-label="Filter listings by status">
          <option value="available" selected>Available</option>
          <option value="all">All listings</option>
        </select>
        <button id="reload-listings" class="ghost">Refresh</button>
        <span id="summary" class="summary"></span>
      </div>

      <div id="listings" class="grid" aria-live="polite"></div>
      <div id="empty" class="empty" hidden></div>
    </section>

    <!-- My Applications -->
    <section id="view-apps" role="tabpanel" aria-labelledby="tab-apps" hidden>
      <div class="panel-controls">
        <button id="reload-apps" class="ghost">Refresh</button>
        <span id="apps-summary" class="summary"></span>
      </div>

      <div id="apps" class="grid grid-wide" aria-live="polite"></div>
      <div id="apps-empty" class="empty" hidden></div>
    </section>

    <!-- Tasks -->
    <section id="view-tasks" role="tabpanel" aria-labelledby="tab-tasks" hidden>
      <div class="panel-controls">
        <button id="reload-tasks" class="ghost">Refresh</button>
        <span id="tasks-summary" class="summary"></span>
      </div>

      <div id="tasks" class="grid grid-wide" aria-live="polite"></div>
      <div id="tasks-empty" class="empty" hidden></div>
    </section>

    <!-- Documents -->
    <section id="view-docs" role="tabpanel" aria-labelledby="tab-docs" hidden>
      <div class="panel-controls">
        <label for="doc-scope">Documents for</label>
        <select id="doc-scope" aria-label="Choose which record to view and attach documents to"></select>
        <button id="reload-docs" class="ghost">Refresh</button>
        <span id="docs-summary" class="summary"></span>
      </div>

      <form id="upload-form" class="upload">
        <div class="field">
          <label for="doc-slot">Document type</label>
          <select id="doc-slot">
            <option value="idDocument">ID document</option>
            <option value="proofOfIncome">Proof of income</option>
            <option value="signedLeasePdf">Signed lease (PDF)</option>
          </select>
        </div>
        <div class="field">
          <label for="doc-file">File</label>
          <input type="file" id="doc-file" />
        </div>
        <button type="submit" id="upload-submit">Upload</button>
      </form>

      <div id="docs" class="grid grid-wide" aria-live="polite"></div>
      <div id="docs-empty" class="empty" hidden></div>
    </section>
  </main>

  <!-- Apply modal -->
  <div id="apply-overlay" class="overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="apply-title">
      <h2 id="apply-title">Apply to lease</h2>
      <div id="apply-unit" class="apply-unit"></div>
      <form id="apply-form">
        <div class="field">
          <label>Applicant</label>
          <div id="apply-applicant" class="readonly"></div>
        </div>
        <div class="field">
          <label for="moveInDate">Desired move-in date <span class="opt">(optional)</span></label>
          <input type="date" id="moveInDate" />
        </div>
        <div class="field">
          <label for="leaseTermMonths">Lease term, months <span class="opt" id="term-opt">(optional)</span></label>
          <input type="number" id="leaseTermMonths" min="1" step="1" placeholder="12" />
          <p class="hint" id="term-hint" hidden>Required when a move-in date is set.</p>
        </div>
        <div class="field">
          <label for="requestedRent">Offered rent <span class="opt">(optional)</span></label>
          <input type="number" id="requestedRent" min="0" step="1" placeholder="e.g. 2400" />
        </div>
        <div class="modal-actions">
          <button type="button" id="apply-cancel" class="ghost">Cancel</button>
          <button type="submit" id="apply-submit">Submit application</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Complete task modal -->
  <div id="complete-overlay" class="overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="complete-title">
      <h2 id="complete-title">Complete task</h2>
      <div id="complete-desc" class="apply-unit"></div>
      <form id="complete-form">
        <div class="field">
          <label>Applies to</label>
          <div id="tc-target" class="readonly"></div>
        </div>
        <div id="tc-fields"></div>
        <p id="tc-sensitive" class="hint" hidden>These details are sensitive and are stored on your identity record.</p>
        <div class="modal-actions">
          <button type="button" id="complete-cancel" class="ghost">Cancel</button>
          <button type="submit" id="complete-submit">Complete</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast" class="toast" hidden></div>

  <script src="app.js"></script>
</body>
</html>
